name: Evaluation

on:
  pull_request:
    paths:
      - 'src/**'
      - '.github/workflows/evaluation.yml'

#  schedule:
#    - cron: '*/45 * * * *'

  workflow_dispatch:
    inputs:
      components:
        description: 'Components to evaluate (comma-separated, empty=all with tests)'
        required: false
        default: ''
      model:
        description: 'Copilot model to use'
        required: false
        default: 'claude-opus-4.5'
      runs:
        description: 'Number of runs per test'
        required: false
        type: number
        default: 3
      verbose:
        description: 'Enable verbose output'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  DOTNET_VERSION: '10.0.x'
  DEFAULT_MODEL: 'claude-opus-4.5'

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.find.outputs.components }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find components with skills and tests
        id: find
        run: |
          $input = "${{ github.event.inputs.components }}"
          if ($input) {
            $components = $input -split ',' | ForEach-Object { $_.Trim() }
          } else {
            $components = Get-ChildItem -Path "src" -Directory |
              Where-Object { (Test-Path (Join-Path $_.FullName "skills")) -and (Test-Path (Join-Path $_.FullName "tests")) } |
              Select-Object -ExpandProperty Name
          }

          $json = $components | ConvertTo-Json -Compress
          if ($components.Count -eq 1) { $json = "[$json]" }
          Write-Host "Components to evaluate: $json"
          echo "components=$json" >> $env:GITHUB_OUTPUT
        shell: pwsh

  evaluate:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJson(needs.discover.outputs.components) }}

    steps:
      - name: Checkout skills repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build skill-validator
        run: cd eng/skill-validator && npm ci && npm run build

      - name: Run skill-validator
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          ARGS="--strict --require-evals"
          ARGS="$ARGS --reporter console --reporter json:.skill-validator-results/results.json"

          MODEL="${{ github.event.inputs.model || env.DEFAULT_MODEL }}"
          if [ -n "$MODEL" ]; then
            ARGS="$ARGS --model $MODEL"
          fi
          if [ -n "${{ github.event.inputs.runs }}" ]; then
            ARGS="$ARGS --runs ${{ github.event.inputs.runs }}"
          fi
          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi

          node eng/skill-validator/dist/index.js $ARGS --tests-dir ./src/${{ matrix.component }}/tests ./src/${{ matrix.component }}/skills

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-validator-results-${{ matrix.component }}
          path: .skill-validator-results/
          include-hidden-files: true
          retention-days: 30

      - name: Generate Summary
        if: always()
        run: |
          RESULTS_DIR=$(ls -d .skill-validator-results/run-* 2>/dev/null | head -1)
          if [ -z "$RESULTS_DIR" ]; then
            echo "## Skill Validation Results — ${{ matrix.component }}" >> $GITHUB_STEP_SUMMARY
            echo "No results found." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          RESULTS_FILE="$RESULTS_DIR/results.json"
          if [ ! -f "$RESULTS_FILE" ]; then
            echo "## Skill Validation Results — ${{ matrix.component }}" >> $GITHUB_STEP_SUMMARY
            echo "No results.json found." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Generate markdown summary from results
          node -e "
          const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('$RESULTS_FILE', 'utf8'));
          let md = '## Skill Validation Results — ${{ matrix.component }}\n\n';
          md += '| Skill | Test | Baseline | With Skill | Δ | Verdict |\n';
          md += '|-------|----------|----------|------------|---|--------|\n';
          for (const v of results.verdicts) {
            for (const s of v.scenarios) {
              const base = s.baseline?.judgeResult?.overallScore?.toFixed(1) ?? '—';
              const skill = s.withSkill?.judgeResult?.overallScore?.toFixed(1) ?? '—';
              const delta = (s.withSkill?.judgeResult?.overallScore - s.baseline?.judgeResult?.overallScore)?.toFixed(1);
              const deltaStr = delta > 0 ? '+' + delta : delta;
              const icon = v.passed ? '✅' : '❌';
              md += '| ' + v.skillName + ' | ' + s.scenarioName + ' | ' + base + '/5 | ' + skill + '/5 | ' + deltaStr + ' | ' + icon + ' |\n';
            }
          }
          md += '\nModel: ' + results.model + ' | Judge: ' + results.judgeModel + '\n';
          md += '\n[Full results](' + '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' + ')\n';
          fs.writeFileSync('.skill-validator-results/summary.md', md);
          process.stdout.write(md);
          " >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file .skill-validator-results/summary.md

  publish-benchmark:
    needs: [discover, evaluate]
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: publish-benchmark-deploy
      cancel-in-progress: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download evaluation artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: skill-validator-results-*
          path: all-results/
          merge-multiple: false

      - name: Fetch existing benchmark data
        run: |
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          mkdir -p /tmp/gh-pages/data
          git checkout gh-pages -- data/ 2>/dev/null && cp -r data/* /tmp/gh-pages/data/ && git checkout HEAD -- . || true

      - name: Generate Benchmark Data
        run: |
          $sha = "${{ github.sha }}"
          $commitMsg = git log -1 --format='%s' $sha
          $commitTimestamp = git log -1 --format='%aI' $sha
          $commitAuthor = git log -1 --format='%an' $sha

          $commitJson = @{
            id        = $sha
            message   = $commitMsg
            timestamp = $commitTimestamp
            url       = "https://github.com/${{ github.repository }}/commit/$sha"
            author    = @{ name = $commitAuthor; username = "${{ github.actor }}" }
          } | ConvertTo-Json -Compress

          # Process each component's results
          $components = '${{ needs.discover.outputs.components }}' | ConvertFrom-Json
          foreach ($component in $components) {
            $artifactDir = "all-results/skill-validator-results-$component"
            $runDir = Get-ChildItem -Path $artifactDir -Directory -Filter "run-*" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $runDir) {
              Write-Warning "No run results found for $component, skipping benchmark generation"
              continue
            }

            Write-Host "`n=== Generating benchmark data for: $component ==="
            $existingFile = "/tmp/gh-pages/data/$component.json"
            $params = @{
              ResultsDir    = $runDir.FullName
              ComponentName = $component
              OutputDir     = "/tmp/gh-pages/data"
              CommitJson    = $commitJson
            }
            if ((Test-Path $existingFile) -and (Get-Content $existingFile -Raw -ErrorAction SilentlyContinue)) {
              $params.ExistingDataFile = $existingFile
            }
            & ./eng/dashboard/generate-benchmark-data.ps1 @params
          }

          # Generate components.json manifest
          $components = Get-ChildItem -Path "/tmp/gh-pages/data" -Filter "*.json" -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -ne "components.json" } |
            ForEach-Object { $_.BaseName }
          @($components) | ConvertTo-Json -AsArray | Out-File -FilePath "/tmp/gh-pages/data/components.json" -Encoding utf8
        shell: pwsh

      - name: Deploy to GitHub Pages
        run: |
          cd /tmp
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          if git ls-remote --exit-code --heads "$REPO_URL" gh-pages > /dev/null 2>&1; then
            git clone --branch gh-pages --single-branch "$REPO_URL" deploy
          else
            mkdir deploy && cd deploy && git init && git checkout -b gh-pages
            git remote add origin "$REPO_URL"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            cd /tmp
          fi

          cd /tmp/deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p data
          cp /tmp/gh-pages/data/*.json data/
          cp ${{ github.workspace }}/eng/dashboard/dashboard.html index.html
          cp ${{ github.workspace }}/eng/dashboard/dashboard.js dashboard.js

          git add .
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Update benchmark data"
          git push origin gh-pages
