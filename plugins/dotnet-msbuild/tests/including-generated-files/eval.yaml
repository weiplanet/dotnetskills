scenarios:
  - name: "Diagnose generated file inclusion failure"
    prompt: "Build this project and diagnose why it fails. The project generates a source file during the build but it's not being compiled."
    setup:
      copy_test_files: true
    assertions:
      - type: "output_contains"
        value: "Compile"
      - type: "output_matches"
        pattern: "(evaluation|execution|phase)"
    rubric:
      - "Identified that the generated file is not included in compilation"
      - "Explained evaluation phase vs execution phase timing — default globs don't capture files generated during build"
      - "Suggested adding generated file to Compile item group inside the target"
      - "Suggested adding generated file to FileWrites item group for clean support"
      - "Provided correct XML fix with Compile Include inside the target, not at project level"
    timeout: 120
