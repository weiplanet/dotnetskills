scenarios:
  - name: "Analyze incremental build issues"
    prompt: "Analyze this project for incremental build issues. Identify any custom targets that would unnecessarily re-run on every build even when nothing has changed."
    setup:
      copy_test_files: true
    assertions:
      - type: "output_contains"
        value: "Inputs"
      - type: "output_contains"
        value: "Outputs"
    rubric:
      - "Identified custom target is missing Inputs and Outputs attributes"
      - "Explained that without Inputs/Outputs, MSBuild runs the target every time"
      - "Suggested adding Inputs and Outputs attributes referencing source files and generated outputs"
      - "Identified generated files not registered in FileWrites for clean support"
      - "Mentioned building twice to verify incrementality (second build should skip the target)"
    timeout: 120
