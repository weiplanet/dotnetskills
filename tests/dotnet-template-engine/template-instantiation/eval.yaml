scenarios:
  - name: "Create a console application"
    prompt: "Create a new .NET console application called MyConsoleApp in the ./test-output directory"
    assertions:
      - type: "exit_success"
      - type: "output_contains"
        value: "MyConsoleApp"
      - type: "file_exists"
        path: "test-output/MyConsoleApp/MyConsoleApp.csproj"
    rubric:
      - "The agent used the template-instantiation skill or dotnet new to create the project"
      - "The agent specified the correct output path"
      - "The agent verified the project was created successfully"
    expect_tools:
      - skill
    timeout: 180
